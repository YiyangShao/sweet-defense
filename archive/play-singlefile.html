<title>甜点防御 — Sweet Defense</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #FFF4E6;
  --cream-2: #FFEAD0;
  --cream-3: #FBDDB7;
  --pink: #FFB5C5;
  --pink-deep: #F58CA6;
  --peach: #FFD9A0;
  --peach-deep: #F5B872;
  --mint: #C4E4D4;
  --mint-deep: #8FCFAE;
  --lavender: #D9C5E8;
  --lavender-deep: #B79CD1;
  --butter: #F8E8B0;
  --butter-deep: #E8CE6E;
  --berry: #E08FB4;
  --choco: #B68A6E;
  --ink: #5A3E36;
  --ink-soft: #8B6F5C;
  --ink-faint: #B89A87;
  --shadow-soft: 0 6px 16px rgba(180, 110, 80, 0.18);
  --shadow-card: 0 8px 24px rgba(180, 110, 80, 0.12), 0 2px 6px rgba(180, 110, 80, 0.08);
  --shadow-deep: 0 14px 40px rgba(180, 110, 80, 0.22);
  --radius-sm: 10px;
  --radius-md: 18px;
  --radius-lg: 28px;
  --radius-xl: 40px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
  font-family: 'Nunito', 'Noto Sans SC', system-ui, sans-serif;
  color: var(--ink);
  background: #F5EBDD;
  -webkit-font-smoothing: antialiased;
  user-select: none;
}
#root { width: 100%; height: 100%; }
.font-display { font-family: 'Fredoka', 'Noto Sans SC', sans-serif; font-weight: 600; letter-spacing: 0.01em; }
.sprinkle-bg {
  background-color: var(--cream);
  background-image:
    radial-gradient(circle at 20% 20%, var(--pink) 2px, transparent 2.5px),
    radial-gradient(circle at 70% 40%, var(--mint) 2px, transparent 2.5px),
    radial-gradient(circle at 40% 75%, var(--butter) 2px, transparent 2.5px),
    radial-gradient(circle at 85% 80%, var(--lavender) 2px, transparent 2.5px),
    radial-gradient(circle at 10% 65%, var(--peach) 2px, transparent 2.5px);
  background-size: 120px 120px, 140px 140px, 110px 110px, 160px 160px, 130px 130px;
  background-position: 0 0, 30px 50px, 60px 20px, 10px 70px, 80px 40px;
}
.bubble-btn {
  font-family: 'Fredoka', 'Noto Sans SC', sans-serif;
  font-weight: 600;
  border: none;
  border-radius: 999px;
  padding: 14px 28px;
  cursor: pointer;
  background: white;
  color: var(--ink);
  box-shadow: 0 4px 0 rgba(180, 110, 80, 0.15), var(--shadow-soft);
  transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
}
.bubble-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 0 rgba(180, 110, 80, 0.15), var(--shadow-card); }
.bubble-btn:active { transform: translateY(1px); }
.bubble-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.bubble-btn.primary {
  background: linear-gradient(180deg, var(--pink) 0%, var(--pink-deep) 100%);
  color: white;
  box-shadow: 0 4px 0 var(--pink-deep), 0 8px 18px rgba(245, 140, 166, 0.4);
}
.bubble-btn.mint {
  background: linear-gradient(180deg, var(--mint) 0%, var(--mint-deep) 100%);
  color: white;
  box-shadow: 0 4px 0 var(--mint-deep), 0 8px 18px rgba(143, 207, 174, 0.4);
}
.cute-card {
  background: white;
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  border: 2px solid rgba(255, 234, 208, 0.8);
}
.stat-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: white;
  border-radius: 999px;
  padding: 8px 16px;
  font-weight: 700;
  box-shadow: var(--shadow-soft);
  border: 2px solid var(--cream-2);
}
@keyframes wobble { 0%, 100% { transform: rotate(-2deg); } 50% { transform: rotate(2deg); } }
.wobble { animation: wobble 3s ease-in-out infinite; }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
.floaty { animation: float 4s ease-in-out infinite; }
@keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.06); } 100% { transform: scale(1); } }
.pop { animation: pop 0.18s ease-out; }
.shop-card { transition: transform 0.12s ease, box-shadow 0.12s ease; }
.shop-card:hover:not(.disabled) { transform: translateY(-3px); }
.shop-card.disabled { opacity: 0.55; cursor: not-allowed; filter: saturate(0.6); }
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(40, 28, 24, 0.45);
  backdrop-filter: blur(3px);
  display: flex; align-items: center; justify-content: center;
  z-index: 50;
}
@keyframes modalIn {
  0% { transform: scale(0.85); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
.modal-in { animation: modalIn 0.22s cubic-bezier(.2,.9,.4,1.2); }
.scene { position: absolute; inset: 0; }
.full { width: 100%; height: 100%; }
@keyframes floatUp {
  0% { transform: translate(-50%, 0); opacity: 1; }
  100% { transform: translate(-50%, -34px); opacity: 0; }
}
@keyframes prepPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}
.prep-pulse { animation: prepPulse 1s ease-in-out infinite; }
</style>

// CONSTANTS
// ============================================================
const T = 80;
const COLS = 16, ROWS = 9;
const W = COLS * T, H = ROWS * T;

const PATH_GRID = [
  [0,1],[1,1],[2,1],[3,1],[3,2],[3,3],[3,4],
  [4,4],[5,4],[6,4],[6,3],[6,2],[7,2],[8,2],
  [9,2],[9,3],[9,4],[9,5],[9,6],[10,6],[11,6],
  [12,6],[12,5],[12,4],[13,4],[14,4],[15,4],
];
const PATH_SET = new Set(PATH_GRID.map(([x,y]) => `${x},${y}`));
const isPathCell = (gx, gy) => PATH_SET.has(`${gx},${gy}`);

const PATH = (() => {
  const points = PATH_GRID.map(([gx,gy]) => ({x: gx*T + T/2, y: gy*T + T/2}));
  const cum = [0];
  for (let i = 1; i < points.length; i++) {
    cum.push(cum[i-1] + Math.hypot(points[i].x - points[i-1].x, points[i].y - points[i-1].y));
  }
  return { points, cum, total: cum[cum.length-1] };
})();

function posAt(dist) {
  if (dist <= 0) return { ...PATH.points[0] };
  if (dist >= PATH.total) return { ...PATH.points[PATH.points.length-1] };
  let lo = 0, hi = PATH.cum.length - 1;
  while (lo < hi - 1) {
    const mid = (lo + hi) >> 1;
    if (PATH.cum[mid] <= dist) lo = mid; else hi = mid;
  }
  const segLen = PATH.cum[lo+1] - PATH.cum[lo];
  const t = (dist - PATH.cum[lo]) / segLen;
  const a = PATH.points[lo], b = PATH.points[lo+1];
  return { x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t };
}

const PREP_DURATION = 5; // seconds between waves

// ============================================================
// WORLD — mutable game state, updated by `update(world, dt)`
// ============================================================
function initWorld() {
  return {
    hp: 20,
    sugar: 250,
    waveIdx: 0,
    waveState: 'preparing', // preparing | spawning | active | cleared
    waveTimer: -PREP_DURATION,
    spawnQueue: [],
    speed: 1,         // 0 paused, 1 normal, 2 fast
    enemies: [],
    towers: [],
    projectiles: [],
    floats: [],       // damage popups
    selectedTowerType: null,
    selectedPlacedTower: null,
    nextId: 1,
    enemiesKilled: 0,
    sugarEarned: 0,
    elapsed: 0,
    finished: null,   // null | 'win' | 'lose'
  };
}

function startWave(w, idx) {
  const wave = WAVES[idx];
  const queue = [];
  for (const group of wave) {
    for (let i = 0; i < group.count; i++) {
      queue.push({ type: group.type, t: (group.delay || 0) + i * group.interval });
    }
  }
  queue.sort((a,b) => a.t - b.t);
  w.spawnQueue = queue;
  w.waveState = 'spawning';
  w.waveTimer = 0;
}

function towerStats(tw) {
  const def = TOWER_DEFS[tw.type];
  const lvl = tw.level;
  const dmgMul = lvl === 1 ? 1 : lvl === 2 ? 1.5 : 2.25;
  const rangeMul = lvl === 1 ? 1 : lvl === 2 ? 1.12 : 1.25;
  const cdMul = lvl === 1 ? 1 : lvl === 2 ? 0.92 : 0.82;
  return {
    dmg: def.dmg * dmgMul,
    range: def.range * rangeMul,
    cd: def.cd * cdMul,
    splash: def.splash,
    slow: def.slow,
    stun: def.stun,
    proj: def.proj,
  };
}

function upgradeCost(tw) {
  const base = TOWER_DEFS[tw.type].cost;
  if (tw.level === 1) return Math.round(base * 1.4);
  if (tw.level === 2) return Math.round(base * 2.2);
  return null;
}

function sellRefund(tw) {
  return Math.round(tw.invested * 0.5);
}

function applyDamage(w, enemy, dmg, opts) {
  const def = ENEMY_DEFS[enemy.type];
  const ep = posAt(enemy.dist);
  if (def.dodge && Math.random() < def.dodge) {
    w.floats.push({ id: w.nextId++, x: ep.x, y: ep.y - 22, text: '闪避', color: '#B79CD1', t: 0 });
    return;
  }
  enemy.hp -= dmg;
  enemy.flash = 0.13;
  w.floats.push({ id: w.nextId++, x: ep.x, y: ep.y - 24, text: `-${Math.round(dmg)}`, color: '#E85A7A', t: 0 });
  if (opts && opts.slow && !def.boss) {
    enemy.slowUntil = w.elapsed + opts.slow.duration;
    enemy.slowFactor = opts.slow.factor;
  }
  if (opts && opts.stun && !def.boss) {
    enemy.stunUntil = w.elapsed + opts.stun;
  }
}

function update(w, rawDt) {
  if (w.finished) return;
  if (w.speed === 0) return;
  const dt = rawDt * w.speed;
  w.elapsed += dt;
  w.waveTimer += dt;

  // Wave preparing → spawning
  if (w.waveState === 'preparing' && w.waveTimer >= 0) {
    startWave(w, w.waveIdx);
  }

  // Spawn enemies whose time has come
  if (w.waveState === 'spawning') {
    while (w.spawnQueue.length && w.spawnQueue[0].t <= w.waveTimer) {
      const spawn = w.spawnQueue.shift();
      const def = ENEMY_DEFS[spawn.type];
      w.enemies.push({
        id: w.nextId++,
        type: spawn.type,
        dist: 0,
        hp: def.hp,
        maxHp: def.hp,
        baseSpeed: def.speed,
        slowUntil: 0, slowFactor: 1,
        stunUntil: 0,
        flash: 0,
        dead: false,
      });
    }
    if (!w.spawnQueue.length) w.waveState = 'active';
  }

  // Move enemies
  for (const e of w.enemies) {
    if (e.dead || e.hp <= 0) continue;
    const slow = w.elapsed < e.slowUntil ? e.slowFactor : 1;
    const stunned = w.elapsed < e.stunUntil;
    if (!stunned) {
      e.dist += e.baseSpeed * T * slow * dt;
    }
    if (e.flash > 0) e.flash = Math.max(0, e.flash - dt);
    if (e.dist >= PATH.total) {
      const def = ENEMY_DEFS[e.type];
      w.hp -= def.damage;
      if (def.steal) w.sugar = Math.max(0, w.sugar - def.steal);
      e.dead = true; e.reachedCastle = true;
      if (w.hp <= 0) { w.hp = 0; w.finished = 'lose'; }
    }
  }

  // Towers fire
  for (const tw of w.towers) {
    const stats = towerStats(tw);
    tw.cooldown = Math.max(0, (tw.cooldown || 0) - dt);
    if (tw.shootPulse > 0) tw.shootPulse = Math.max(0, tw.shootPulse - dt);
    if (tw.cooldown > 0) continue;

    const tx = tw.gx*T + T/2, ty = tw.gy*T + T/2;
    const rangePx = stats.range * T;
    let best = null, bestProgress = -1;
    for (const e of w.enemies) {
      if (e.dead || e.hp <= 0) continue;
      const ep = posAt(e.dist);
      const d = Math.hypot(ep.x - tx, ep.y - ty);
      if (d <= rangePx && e.dist > bestProgress) {
        best = e; bestProgress = e.dist;
      }
    }
    if (best) {
      const ep = posAt(best.dist);
      w.projectiles.push({
        id: w.nextId++,
        fromX: tx, fromY: ty,
        toX: ep.x, toY: ep.y,
        targetId: best.id,
        t: 0,
        duration: tw.type === 'macaron' ? 0.14 : tw.type === 'cake' ? 0.20 : 0.16,
        color: stats.proj,
        size: tw.type === 'cake' ? 9 : tw.type === 'donut' ? 8 : 6,
        dmg: stats.dmg,
        splash: stats.splash,
        slow: stats.slow,
        stun: stats.stun,
      });
      tw.cooldown = stats.cd;
      tw.shootPulse = 0.18;
    }
  }

  // Update projectiles
  for (const p of w.projectiles) {
    p.t += dt / p.duration;
    if (p.t >= 1) {
      const target = w.enemies.find(e => e.id === p.targetId);
      let hitX = p.toX, hitY = p.toY;
      if (target && !target.dead) {
        const ep = posAt(target.dist);
        hitX = ep.x; hitY = ep.y;
        applyDamage(w, target, p.dmg, p);
      }
      if (p.splash) {
        const r = p.splash * T;
        for (const e of w.enemies) {
          if (e.dead || e.hp <= 0) continue;
          if (target && e.id === target.id) continue;
          const ep = posAt(e.dist);
          const d = Math.hypot(ep.x - hitX, ep.y - hitY);
          if (d <= r) applyDamage(w, e, p.dmg * 0.55, p);
        }
      }
      p.dead = true;
    }
  }
  w.projectiles = w.projectiles.filter(p => !p.dead);

  // Reward kills
  for (const e of w.enemies) {
    if (e.hp <= 0 && !e.dead) {
      e.dead = true;
      if (!e.reachedCastle) {
        const def = ENEMY_DEFS[e.type];
        w.sugar += def.reward;
        w.sugarEarned += def.reward;
        w.enemiesKilled += 1;
      }
    }
  }
  w.enemies = w.enemies.filter(e => !e.dead);

  // Float popups age out
  for (const f of w.floats) f.t += dt;
  w.floats = w.floats.filter(f => f.t < 0.7);

  // Wave cleared?
  if (w.waveState === 'active' && w.spawnQueue.length === 0 && w.enemies.length === 0) {
    if (w.waveIdx + 1 >= WAVES.length) {
      w.finished = 'win';
    } else {
      w.waveIdx += 1;
      w.waveState = 'preparing';
      w.waveTimer = -PREP_DURATION;
      w.sugar += 25; // wave clear bonus
      w.sugarEarned += 25;
    }
  }
}

function HUD({ world, onPause, onSpeed, onMenu, onEarlyStart }) {
  const wave = world.waveIdx + 1;
  const time = (() => {
    const s = Math.floor(world.elapsed);
    return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
  })();
  const preparing = world.waveState === 'preparing';
  const prepLeft = preparing ? Math.max(0, -world.waveTimer) : 0;

  return (
    <div style={{position:'absolute', top:0, left:0, right:0, padding:'14px 18px', display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:14, pointerEvents:'none', zIndex:5}}>
      <div style={{display:'flex', gap:10, alignItems:'center', pointerEvents:'auto'}}>
        <div className="stat-pill"><Heart size={20}/><span style={{fontSize:18}}>{world.hp}</span></div>
        <div className="stat-pill"><Sugar size={20}/><span style={{fontSize:18}}>{world.sugar}</span></div>
        <button className="bubble-btn" style={{padding:'8px 14px', fontSize:13, pointerEvents:'auto'}} onClick={onMenu}>← 主菜单</button>
      </div>

      <div className="cute-card font-display" style={{padding:'10px 22px', display:'flex', alignItems:'center', gap:14, borderRadius:999, pointerEvents:'auto'}}>
        <span style={{fontSize:14, color:'var(--ink-soft)'}}>第</span>
        <span style={{fontSize:24, color:'var(--berry)'}}>{wave}</span>
        <span style={{fontSize:14, color:'var(--ink-soft)'}}>/ {WAVES.length} 波</span>
        <div style={{width:1, height:20, background:'var(--cream-3)'}}/>
        <span style={{fontSize:16}}>⏱ {time}</span>
        {preparing && wave <= WAVES.length && (
          <Fragment>
            <div style={{width:1, height:20, background:'var(--cream-3)'}}/>
            <span style={{fontSize:14, color:'var(--pink-deep)'}}>⏳ {prepLeft.toFixed(1)}s</span>
          </Fragment>
        )}
      </div>

      <div style={{display:'flex', gap:8, pointerEvents:'auto'}}>
        <button className="bubble-btn" style={{padding:'10px 14px', fontSize:14}} onClick={onPause}>{world.speed === 0 ? '▶' : '⏸'}</button>
        <button className={`bubble-btn ${world.speed === 2 ? 'mint' : ''}`} style={{padding:'10px 14px', fontSize:14}} onClick={onSpeed}>{world.speed === 2 ? '▶▶ 加速中' : '▶▶ 加速'}</button>
      </div>
    </div>
  );
}

// ============================================================
// Wave preview card
// ============================================================
function WavePreview({ world, onEarlyStart }) {
  const nextIdx = world.waveState === 'preparing' ? world.waveIdx : world.waveIdx + 1;
  if (nextIdx >= WAVES.length) return null;
  const wave = WAVES[nextIdx];
  const counts = {};
  for (const g of wave) counts[g.type] = (counts[g.type] || 0) + g.count;
  const types = Object.keys(counts).slice(0, 4);
  return (
    <div className="cute-card" style={{position:'absolute', top:84, right:18, padding:12, minWidth:210, zIndex:6}}>
      <div className="font-display" style={{fontSize:13, color:'var(--ink-soft)', marginBottom:8, letterSpacing:'0.1em'}}>
        下一波 ▸ #{nextIdx + 1}
      </div>
      <div style={{display:'flex', gap:8, alignItems:'flex-end', justifyContent:'space-around', flexWrap:'wrap'}}>
        {types.map(t => {
          const Comp = ENEMY_DEFS[t].Comp;
          return (
            <div key={t} style={{textAlign:'center'}}>
              <Comp size={38}/>
              <div style={{fontSize:12, fontWeight:700, marginTop:-2}}>×{counts[t]}</div>
            </div>
          );
        })}
      </div>
      {world.waveState === 'preparing' && (
        <button className="bubble-btn primary prep-pulse" style={{width:'100%', marginTop:10, padding:'8px 12px', fontSize:13}} onClick={onEarlyStart}>
          ▶ 提前开始 +5
        </button>
      )}
    </div>
  );
}

// ============================================================
// Game Board — the SVG scene
// ============================================================
function GameBoard({ world, hover, ghost, onCellClick, onCellRightClick, onTowerClick, onMouseMove, onMouseLeave, svgRef }) {
  const enemyEls = world.enemies.map(e => {
    const ep = posAt(e.dist);
    const def = ENEMY_DEFS[e.type];
    const Comp = def.Comp;
    const size = def.boss ? T * 1.2 : T * 0.78;
    const hpPct = e.hp / e.maxHp;
    const hpW = def.boss ? 70 : 44;
    return (
      <g key={e.id} transform={`translate(${ep.x} ${ep.y})`} style={{filter: e.flash > 0 ? 'brightness(1.5) saturate(0.6)' : undefined}}>
        <g transform={`translate(${-size/2} ${-size/2})`}>
          <Comp size={size}/>
        </g>
        <g transform={`translate(${-hpW/2} ${-size/2 - 12})`}>
          <rect x="0" y="0" width={hpW} height="7" rx="3.5" fill="white" stroke="#E5DCC5" strokeWidth="1"/>
          <rect x="2" y="2" width={(hpW-4) * hpPct} height="3" rx="1.5"
                fill={hpPct > 0.5 ? "#8FCFAE" : hpPct > 0.25 ? "#F8E060" : "#F58CA6"}/>
        </g>
        {e.slowUntil > world.elapsed && (
          <circle cx="0" cy={size/2 - 8} r={size/2 - 4} fill="rgba(168,217,192,0.25)" stroke="#A8D9C0" strokeWidth="2" strokeDasharray="3 3"/>
        )}
        {e.stunUntil > world.elapsed && (
          <text x="0" y={-size/2 - 18} textAnchor="middle" fontSize="20">⭐</text>
        )}
      </g>
    );
  });

  const towerEls = world.towers.map(tw => {
    const def = TOWER_DEFS[tw.type];
    const Comp = def.Comp;
    const cx = tw.gx*T + T/2, cy = tw.gy*T + T/2;
    const sz = T * (tw.shootPulse > 0 ? 1.04 : 1.0);
    const isSelected = world.selectedPlacedTower === tw.id;
    return (
      <g key={tw.id} style={{cursor:'pointer'}} onClick={(e) => { e.stopPropagation(); onTowerClick(tw.id); }}>
        <ellipse cx={cx} cy={cy+8} rx={T*0.42} ry={T*0.18} fill="rgba(90,62,54,0.12)"/>
        <circle cx={cx} cy={cy} r={T*0.42} fill={isSelected ? 'rgba(255, 234, 208, 0.95)' : 'white'} opacity={isSelected ? 1 : 0.5} stroke={isSelected ? 'var(--pink-deep)' : 'transparent'} strokeWidth="3"/>
        <g transform={`translate(${cx - sz/2} ${cy - sz/2 - 4})`}>
          <Comp size={sz}/>
        </g>
        {tw.level > 1 && (
          <g transform={`translate(${cx + T*0.22} ${cy - T*0.22})`}>
            <circle r="11" fill="white" stroke="#F58CA6" strokeWidth="2"/>
            <text x="0" y="3.5" textAnchor="middle" fontSize="11" fontWeight="700" fill="#F58CA6" fontFamily="Fredoka, sans-serif">{tw.level}</text>
          </g>
        )}
      </g>
    );
  });

  const projectileEls = world.projectiles.map(p => {
    const x = p.fromX + (p.toX - p.fromX) * p.t;
    const y = p.fromY + (p.toY - p.fromY) * p.t;
    return (
      <g key={p.id}>
        <line x1={p.fromX} y1={p.fromY} x2={x} y2={y} stroke={p.color} strokeWidth="2" strokeDasharray="3 3" opacity="0.4"/>
        <circle cx={x} cy={y} r={p.size} fill={p.color}/>
        <circle cx={x} cy={y} r={p.size - 2} fill="white" opacity="0.4"/>
      </g>
    );
  });

  const floatEls = world.floats.map(f => (
    <g key={f.id} transform={`translate(${f.x} ${f.y - f.t * 50})`} style={{opacity: 1 - f.t/0.7}}>
      <text textAnchor="middle" fontFamily="Fredoka, sans-serif" fontWeight="700" fontSize={f.text === '闪避' ? 16 : 22} fill={f.color}
            stroke="white" strokeWidth="3" paintOrder="stroke">
        {f.text}
      </text>
    </g>
  ));

  // Range circle for selected placed tower
  const selectedTw = world.selectedPlacedTower != null ? world.towers.find(t => t.id === world.selectedPlacedTower) : null;
  const selectedRange = selectedTw && (() => {
    const stats = towerStats(selectedTw);
    const cx = selectedTw.gx*T + T/2, cy = selectedTw.gy*T + T/2;
    return (
      <g>
        <circle cx={cx} cy={cy} r={stats.range * T} fill="rgba(255,181,197,0.18)" stroke="#F58CA6" strokeWidth="3" strokeDasharray="8 6"/>
      </g>
    );
  })();

  // Ghost preview when placing
  const ghostEl = ghost && (() => {
    const def = TOWER_DEFS[ghost.type];
    const Comp = def.Comp;
    const cx = ghost.gx*T + T/2, cy = ghost.gy*T + T/2;
    const valid = ghost.valid;
    return (
      <g>
        <circle cx={cx} cy={cy} r={def.range * T} fill={valid ? 'rgba(143,207,174,0.18)' : 'rgba(245,140,166,0.18)'} stroke={valid ? '#8FCFAE' : '#F58CA6'} strokeWidth="3" strokeDasharray="8 6"/>
        <rect x={ghost.gx*T+4} y={ghost.gy*T+4} width={T-8} height={T-8} rx="14" fill={valid ? 'rgba(143,207,174,0.22)' : 'rgba(245,140,166,0.22)'} stroke={valid ? '#8FCFAE' : '#F58CA6'} strokeWidth="3" strokeDasharray="6 4"/>
        <g transform={`translate(${cx - T/2} ${cy - T/2 - 4})`} opacity="0.7">
          <Comp size={T}/>
        </g>
      </g>
    );
  })();

  return (
    <svg
      ref={svgRef}
      viewBox={`0 0 ${W} ${H}`}
      preserveAspectRatio="xMidYMid meet"
      width="100%" height="100%"
      style={{display:'block', cursor: ghost ? 'crosshair' : 'default'}}
      onClick={onCellClick}
      onContextMenu={onCellRightClick}
      onMouseMove={onMouseMove}
      onMouseLeave={onMouseLeave}
    >
      <defs>
        <pattern id="grassPat" x="0" y="0" width={T} height={T} patternUnits="userSpaceOnUse">
          <rect width={T} height={T} fill="#C4E4D4"/>
          <circle cx={T*0.25} cy={T*0.3} r="3" fill="#A8D9C0" opacity="0.6"/>
          <circle cx={T*0.7} cy={T*0.6} r="2.5" fill="#A8D9C0" opacity="0.5"/>
          <circle cx={T*0.4} cy={T*0.8} r="2" fill="#FFB5C5" opacity="0.5"/>
        </pattern>
        <pattern id="grassPat2" x="0" y="0" width={T} height={T} patternUnits="userSpaceOnUse">
          <rect width={T} height={T} fill="#D4ECDD"/>
          <circle cx={T*0.6} cy={T*0.25} r="2.5" fill="#A8D9C0" opacity="0.5"/>
          <circle cx={T*0.2} cy={T*0.6} r="2" fill="#F8E060" opacity="0.6"/>
          <circle cx={T*0.8} cy={T*0.85} r="3" fill="#A8D9C0" opacity="0.5"/>
        </pattern>
      </defs>

      {/* Grass tiles */}
      {Array.from({length: ROWS}, (_, gy) =>
        Array.from({length: COLS}, (_, gx) => (
          <rect key={`${gx}-${gy}`} x={gx*T} y={gy*T} width={T} height={T} fill={(gx+gy)%2===0 ? 'url(#grassPat)' : 'url(#grassPat2)'}/>
        ))
      )}

      {/* Subtle grid */}
      {Array.from({length: COLS+1}, (_, i) => (
        <line key={`v${i}`} x1={i*T} y1="0" x2={i*T} y2={H} stroke="#A8D9C0" strokeWidth="0.5" opacity="0.4"/>
      ))}
      {Array.from({length: ROWS+1}, (_, i) => (
        <line key={`h${i}`} x1="0" y1={i*T} x2={W} y2={i*T} stroke="#A8D9C0" strokeWidth="0.5" opacity="0.4"/>
      ))}

      {/* Path strokes */}
      <polyline points={PATH.points.map(p => `${p.x},${p.y}`).join(' ')} fill="none" stroke="#E0BC8C" strokeWidth={T*0.95} strokeLinejoin="round" strokeLinecap="round"/>
      <polyline points={PATH.points.map(p => `${p.x},${p.y}`).join(' ')} fill="none" stroke="#F5DEB3" strokeWidth={T*0.78} strokeLinejoin="round" strokeLinecap="round"/>

      {/* Sprinkles along path */}
      {PATH_GRID.filter((_, i) => i % 2 === 0).map(([gx, gy], i) => {
        const cx = gx*T + T/2, cy = gy*T + T/2;
        const colors = ['#FFB5C5','#7BC4A0','#F8E060','#B79CD1','#F5B872'];
        return (
          <g key={`sp${i}`}>
            <rect x={cx-18} y={cy-12} width="6" height="2.5" rx="1.2" fill={colors[i%5]} transform={`rotate(${(i*37)%180-90} ${cx-15} ${cy-11})`}/>
            <rect x={cx+10} y={cy+8} width="6" height="2.5" rx="1.2" fill={colors[(i+2)%5]} transform={`rotate(${(i*53)%180-90} ${cx+13} ${cy+9})`}/>
          </g>
        );
      })}

      {/* Start marker */}
      {(() => {
        const p = PATH.points[0];
        return (
          <g>
            <circle cx={p.x - 18} cy={p.y} r="22" fill="#8FCFAE" stroke="white" strokeWidth="3"/>
            <text x={p.x - 18} y={p.y+5} textAnchor="middle" fontSize="16" fontWeight="700" fill="white" fontFamily="Fredoka, sans-serif">起</text>
          </g>
        );
      })()}

      {/* Castle (end) */}
      {(() => {
        const p = PATH.points[PATH.points.length-1];
        return (
          <g transform={`translate(${p.x + T/2 - 50} ${p.y - 50})`}>
            <rect x="0" y="20" width="46" height="50" rx="4" fill="#FFE5EC"/>
            <path d="M 0 20 L 6 8 L 12 20 L 18 8 L 24 20 L 30 8 L 36 20 L 42 8 L 46 20 Z" fill="#F58CA6"/>
            <rect x="18" y="40" width="10" height="30" fill="#5A3E36"/>
            <circle cx="23" cy="14" r="5" fill="#F58CA6"/>
            <text x="23" y="86" textAnchor="middle" fontSize="11" fontWeight="700" fill="#5A3E36" fontFamily="Fredoka, sans-serif">糖果城堡</text>
          </g>
        );
      })()}

      {selectedRange}
      {towerEls}
      {ghostEl}
      {enemyEls}
      {projectileEls}
      {floatEls}
    </svg>
  );
}

// ============================================================
// Gameplay screen — composes board + HUD + shop + modal
// ============================================================
function GameplayScreen({ onWin, onLose, onMenu }) {
  const worldRef = useRef(initWorld());
  const [, forceTick] = useState(0);
  const svgRef = useRef(null);
  const [hover, setHover] = useState(null); // {gx, gy}

  const w = worldRef.current;

  useEffect(() => {
    let raf;
    let last = performance.now();
    const loop = (now) => {
      const dt = Math.min((now - last) / 1000, 0.05);
      last = now;
      update(worldRef.current, dt);
      forceTick(t => (t + 1) & 0xffff);
      const ww = worldRef.current;
      if (ww.finished === 'win') {
        onWin({ hp: ww.hp, killed: ww.enemiesKilled, earned: ww.sugarEarned });
        return;
      }
      if (ww.finished === 'lose') {
        onLose({ hp: 0, killed: ww.enemiesKilled, wave: ww.waveIdx + 1 });
        return;
      }
      raf = requestAnimationFrame(loop);
    };
    raf = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(raf);
  }, [onWin, onLose]);

  // Keyboard: Esc cancels, P pauses
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'Escape') {
        worldRef.current.selectedTowerType = null;
        worldRef.current.selectedPlacedTower = null;
        forceTick(t => t + 1);
      }
      if (e.key === 'p' || e.key === 'P' || e.key === ' ') {
        e.preventDefault();
        worldRef.current.speed = worldRef.current.speed === 0 ? 1 : 0;
        forceTick(t => t + 1);
      }
      if (e.key === 'f' || e.key === 'F') {
        worldRef.current.speed = worldRef.current.speed === 2 ? 1 : 2;
        forceTick(t => t + 1);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const eventToCell = (e) => {
    if (!svgRef.current) return null;
    const rect = svgRef.current.getBoundingClientRect();
    const sx = (e.clientX - rect.left) / rect.width * W;
    const sy = (e.clientY - rect.top) / rect.height * H;
    const gx = Math.floor(sx / T);
    const gy = Math.floor(sy / T);
    if (gx < 0 || gx >= COLS || gy < 0 || gy >= ROWS) return null;
    return { gx, gy };
  };

  const towerAt = (gx, gy) => w.towers.find(tw => tw.gx === gx && tw.gy === gy);

  const onMouseMove = (e) => {
    const c = eventToCell(e);
    setHover(c);
  };
  const onMouseLeave = () => setHover(null);

  const onCellClick = (e) => {
    const c = eventToCell(e);
    if (!c) return;
    // Selecting a placed tower? handled by tower onClick (stopPropagation)
    if (w.selectedTowerType) {
      const def = TOWER_DEFS[w.selectedTowerType];
      if (isPathCell(c.gx, c.gy)) return;
      if (towerAt(c.gx, c.gy)) return;
      if (w.sugar < def.cost) return;
      w.sugar -= def.cost;
      w.towers.push({
        id: w.nextId++,
        type: w.selectedTowerType,
        gx: c.gx, gy: c.gy,
        level: 1,
        invested: def.cost,
        cooldown: 0,
        shootPulse: 0,
      });
      // Stay in place mode if shift is held (otherwise exit)
      if (!e.shiftKey) w.selectedTowerType = null;
      forceTick(t => t + 1);
      return;
    }
    // Otherwise, deselect any placed tower
    if (w.selectedPlacedTower != null) {
      w.selectedPlacedTower = null;
      forceTick(t => t + 1);
    }
  };

  const onCellRightClick = (e) => {
    e.preventDefault();
    if (w.selectedTowerType) {
      w.selectedTowerType = null;
      forceTick(t => t + 1);
    }
  };

  const onTowerClick = (id) => {
    if (w.selectedTowerType) return; // ignore while placing
    w.selectedPlacedTower = id;
    forceTick(t => t + 1);
  };

  const onShopSelect = (type) => {
    w.selectedTowerType = w.selectedTowerType === type ? null : type;
    w.selectedPlacedTower = null;
    forceTick(t => t + 1);
  };

  const onPause = () => {
    w.speed = w.speed === 0 ? 1 : 0;
    forceTick(t => t + 1);
  };
  const onSpeed = () => {
    w.speed = w.speed === 2 ? 1 : 2;
    forceTick(t => t + 1);
  };
  const onEarlyStart = () => {
    if (w.waveState === 'preparing' && w.waveTimer < 0) {
      w.sugar += 5;
      w.sugarEarned += 5;
      w.waveTimer = 0;
      forceTick(t => t + 1);
    }
  };

  const onUpgrade = () => {
    const tw = w.towers.find(t => t.id === w.selectedPlacedTower);
    if (!tw) return;
    const cost = upgradeCost(tw);
    if (cost == null || w.sugar < cost) return;
    w.sugar -= cost;
    tw.level += 1;
    tw.invested += cost;
    forceTick(t => t + 1);
  };

  const onSell = () => {
    const tw = w.towers.find(t => t.id === w.selectedPlacedTower);
    if (!tw) return;
    w.sugar += sellRefund(tw);
    w.towers = w.towers.filter(t => t.id !== tw.id);
    w.selectedPlacedTower = null;
    forceTick(t => t + 1);
  };

  const onCloseModal = () => {
    w.selectedPlacedTower = null;
    forceTick(t => t + 1);
  };

  // Ghost preview
  const ghost = (() => {
    if (!w.selectedTowerType || !hover) return null;
    const valid = !isPathCell(hover.gx, hover.gy)
      && !towerAt(hover.gx, hover.gy)
      && w.sugar >= TOWER_DEFS[w.selectedTowerType].cost;
    return { type: w.selectedTowerType, gx: hover.gx, gy: hover.gy, valid };
  })();

  const selectedTw = w.selectedPlacedTower != null ? w.towers.find(t => t.id === w.selectedPlacedTower) : null;

  return (
    <div className="full" style={{position:'relative', overflow:'hidden', background:'#C4E4D4'}}>
      <div style={{position:'absolute', inset:0}}>
        <GameBoard
          world={w}
          hover={hover}
          ghost={ghost}
          onCellClick={onCellClick}
          onCellRightClick={onCellRightClick}
          onTowerClick={onTowerClick}
          onMouseMove={onMouseMove}
          onMouseLeave={onMouseLeave}
          svgRef={svgRef}
        />
      </div>
      <HUD world={w} onPause={onPause} onSpeed={onSpeed} onMenu={onMenu} onEarlyStart={onEarlyStart}/>
      <WavePreview world={w} onEarlyStart={onEarlyStart}/>
      <TowerShop selected={w.selectedTowerType} sugar={w.sugar} onSelect={onShopSelect}/>
      {selectedTw && (
        <TowerDetailModal
          tower={selectedTw}
          sugar={w.sugar}
          onUpgrade={onUpgrade}
          onSell={onSell}
          onClose={onCloseModal}
        />
      )}
      {w.speed === 0 && (
        <div style={{position:'absolute', inset:0, background:'rgba(40,28,24,0.35)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:7, pointerEvents:'none'}}>
          <div className="font-display" style={{fontSize:88, color:'white', textShadow:'0 4px 20px rgba(0,0,0,0.4)'}}>⏸ 暂停</div>
        </div>
      )}
    </div>
  );
}

// ============================================================
// App — top-level screen router
// ============================================================
function App() {
  const [screen, setScreen] = useState('menu');
  const [stats, setStats] = useState(null);

  if (screen === 'menu') {
    return <MainMenu onStart={() => setScreen('play')}/>;
  }
  if (screen === 'play') {
    return <GameplayScreen
      key={Date.now()}
      onWin={s => { setStats(s); setScreen('victory'); }}
      onLose={s => { setStats(s); setScreen('defeat'); }}
      onMenu={() => setScreen('menu')}
    />;
  }
  if (screen === 'victory') {
    return <VictoryScreen stats={stats} onRetry={() => setScreen('play')} onMenu={() => setScreen('menu')}/>;
  }
  if (screen === 'defeat') {
    return <DefeatScreen stats={stats} onRetry={() => setScreen('play')} onMenu={() => setScreen('menu')}/>;
  }
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
